// --- Random Quiz Selection ---
function getRandomQuestions(bank, count=25){
    const shuffled = [...bank].sort(()=>0.5-Math.random());
    return shuffled.slice(0,count);
}
let quizQuestions = getRandomQuestions(questionBank);
let currentAnswers = Array(quizQuestions.length).fill(null);

// --- Render Quiz ---
const quizContainer = document.getElementById('quizContainer');
quizQuestions.forEach((q,i)=>{
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<strong>${i+1}. ${q.question}</strong><br>`;
    q.options.forEach((opt,j)=>{
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = ()=>{ currentAnswers[i]=j; btn.style.background='#7a5b3c'; };
        div.appendChild(btn);
    });
    quizContainer.appendChild(div);
});

// --- Submit Button ---
const submitBtn = document.createElement('button');
submitBtn.innerText = 'Submit Quiz';
submitBtn.onclick = ()=>{ calculateResults(); };
quizContainer.appendChild(submitBtn);

// --- Results Calculation ---
function calculateResults(){
    quizContainer.style.display='none';
    document.getElementById('mapContainer').style.display='block';
    const svg = document.getElementById('mapSVG');
    currentAnswers.forEach((ans,i)=>{
        const q = quizQuestions[i];
        if(ans === q.answer){
            const dot = document.createElementNS("http://www.w3.org/2000/svg",'circle');
            // Simple scaling: longitude -180→180 to 0→360, latitude 90→-90 to 0→180
            dot.setAttribute('cx', q.region.lon + 180);
            dot.setAttribute('cy', 90 - q.region.lat);
            dot.setAttribute('r', 4);
            dot.setAttribute('fill','#b2855c');
            svg.appendChild(dot);
        }
    });
}
</script>
